<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 运营成本与定价看板</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc;
            --panel-bg: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --budget-gradient: linear-gradient(135deg, #ef4444 0%, #f97316 100%);
            --border: #e2e8f0;
            --radius: 16px;
            --max-width: 700px;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 40px 20px;
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 24px 24px;
        }

        .header-image {
            width: 100%;
            max-width: var(--max-width);
            height: auto;
            margin-bottom: 24px;
            border-radius: var(--radius);
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
        }

        .container {
            width: 100%;
            max-width: var(--max-width);
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* --- Tab 样式 --- */
        .tabs-container {
            display: flex;
            gap: 16px;
            width: 100%;
        }

        .tab-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px;
            background: var(--panel-bg);
            border: 2px solid transparent;
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            color: var(--text-sub);
            font-weight: 600;
            font-size: 1.05rem;
        }

        .tab-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        .tab-btn.active {
            border-color: #6366f1;
            color: #1e293b;
            background: #f8fafc;
        }

        .tab-btn[data-target="tab-budget"].active {
            border-color: #ef4444;
        }

        .tab-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #e2e8f0;
            background-color: #f1f5f9;
        }

        .tab-btn.active .tab-avatar { border-color: #6366f1; }
        .tab-btn[data-target="tab-budget"].active .tab-avatar { border-color: #ef4444; }

        .tab-content {
            display: none;
            width: 100%;
            flex-direction: column;
            gap: 24px;
            animation: fadeIn 0.4s ease forwards;
        }

        .tab-content.active { display: flex; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- 面板组件样式 --- */
        .card {
            background: var(--panel-bg);
            padding: 30px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
        }

        .section-title {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #1e293b;
        }

        .title-line {
            width: 40px;
            height: 4px;
            background: var(--primary-gradient);
            border-radius: 2px;
            margin-bottom: 20px;
        }

        .section-desc {
            font-size: 0.85rem;
            color: var(--text-sub);
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
        }

        .group { margin-bottom: 16px; }
        
        label { 
            display: block; font-size: 0.75rem; margin-bottom: 6px; 
            color: var(--text-sub); font-weight: 600; text-transform: uppercase;
        }

        select, input { 
            width: 100%; padding: 12px 14px; border: 1px solid var(--border); 
            border-radius: 10px; font-size: 0.95rem; background: #fcfcfd;
            outline: none; box-sizing: border-box; transition: 0.2s;
        }

        select:focus, input:focus { 
            border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .result-box {
            background: #f8fafc; padding: 20px; border-radius: 12px;
            text-align: center; border: 1px dashed var(--border);
        }

        .highlight-text {
            font-size: 2.2rem; font-weight: 800; background: var(--primary-gradient);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* 表格与 Toast 样式 */
        .budget-table {
            width: 100%; border-collapse: collapse; margin-top: 8px;
            font-size: 0.85rem; text-align: left;
        }
        .budget-table th, .budget-table td { padding: 10px; border: 1px solid var(--border); }
        .budget-table th { background-color: #f1f5f9; color: var(--text-sub); font-weight: 600; }
        .budget-table tr:hover { background-color: #f8fafc; }
        .price-highlight { color: #e11d48; font-weight: bold; }
        
        #toast {
            visibility: hidden; min-width: 250px; background-color: #333; color: #fff;
            text-align: center; border-radius: 8px; padding: 16px; position: fixed;
            z-index: 1000; left: 50%; top: 30px; transform: translateX(-50%);
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
        }
        #toast.show {
            visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }
        @keyframes fadein { from {top: 0; opacity: 0;} to {top: 30px; opacity: 1;} }
        @keyframes fadeout { from {top: 30px; opacity: 1;} to {top: 0; opacity: 0;} }

        @media (max-width: 600px) {
            .grid-3 { grid-template-columns: 1fr; }
            .tabs-container { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="tabs-container">

                <span>API 调用价格</span>
            </button>

                <span>AI 视频预算分析</span>
            </button>
        </div>

        <div id="tab-api" class="tab-content active">
            <div class="card">
                <div class="section-title">🔍 01 模型库与单价查询</div>
                <div class="title-line"></div>
                <div class="section-desc">📑 同步市面热门 AI 模型计费规则，实时查询 API 原始采购成本。</div>

                    <div class="group">

                </div>
            </div>

            <div class="card">
                <div class="section-title">🧮 02 生产成本核算器</div>
                <div class="title-line"></div>
                <div class="section-desc">📏 根据预期的生成规模，快速估算本次生产任务的原始 API 支出总额。</div>
                <div class="group">
                    <label id="inputLabel">输入生成数量 (整数)</label>

            <div class="card" style="border: 1px solid #c7d2fe;">

                <div class="grid-3" style="grid-template-columns: 1fr 2.5fr;">
                    <div class="group">

                        <input type="number" id="roiInput" value="1.5" step="0.1">

                    <div class="group">

                    </div>
                </div>
            </div>
        </div>

        <div id="tab-budget" class="tab-content">
            <div class="card" style="border: 1px solid #fca5a5;">
                <div class="section-title">📊 视频数据设定</div>
                <div class="title-line" style="background: var(--budget-gradient);"></div>
                <div class="grid-3">
                    <div class="group">
                        <label>每集时长 (秒)</label>
                        <input type="number" id="epDuration" value="60" step="1">
                    </div>
                    <div class="group">
                        <label>集数 (集)</label>
                        <input type="number" id="epCount" value="1" step="1">
                    </div>
                    <div class="group">
                        <label>分镜视频时长 (秒/段)</label>
                        <input type="number" id="shotDuration" value="10" step="1">
                    </div>
                </div>

                <div class="grid-3" style="background: #fff1f2; padding: 15px; border-radius: 10px; margin-bottom: 16px;">
                    <div class="group" style="margin-bottom: 0;">
                        <label>分镜数 (自动计算)</label>
                        <div id="shotCountDisplay" style="font-size: 1.2rem; font-weight: bold; color: #be123c;">6</div>
                    </div>
                    <div class="group" style="margin-bottom: 0;">
                        <label>首帧图数量</label>
                        <div id="firstFrameCountDisplay" style="font-size: 1.2rem; font-weight: bold; color: #be123c;">6</div>
                    </div>
                </div>

                <div class="grid-3">
                    <div class="group">
                        <label>首帧图抽卡数 (次/帧)</label>
                        <input type="number" id="imgDraws" value="10" step="1">
                    </div>
                    <div class="group">
                        <label>分镜视频抽卡数 (次/段)</label>
                        <input type="number" id="vidDraws" value="5" step="1">
                    </div>
                </div>

                    </div>

                </div>

                    <div class="group">
                        <label>单价</label>

                <label style="margin-top: 10px; font-size: 0.85rem; color: #1e293b;">费用详情对比 (按不同会员等级)</label>
                <div style="overflow-x: auto;">
                    <table class="budget-table" id="videoBudgetTable"></table>
                </div>
            </div>
        </div>

        <div id="toast">大模型不支持</div>

    // ==========================================

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const targetId = e.currentTarget.dataset.target;
                
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                e.currentTarget.classList.add('active');
                
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                document.getElementById(targetId).classList.add('active');
            });
        });

        // 2. 绑定 第一面板 (API价格) 的联动计算事件
        document.getElementById('funcSelect').addEventListener('change', filterProviders);
        document.getElementById('providerSelect').addEventListener('change', filterVersions);
        document.getElementById('versionSelect').addEventListener('change', updateUnitPrice);
        document.getElementById('quantity').addEventListener('input', calculateAll);
        document.getElementById('roiInput').addEventListener('input', calculateAll);

        ['epDuration', 'epCount', 'imgDraws', 'vidDraws', 'imgModelSelect', 'vidModelSelect'].forEach(id => {
            document.getElementById(id).addEventListener('input', calculateBudgetAnalyis);
        });
        document.getElementById('shotDuration').addEventListener('input', validateShotDuration);
        document.getElementById('imgProviderSelect').addEventListener('change', renderImageModels);
        document.getElementById('vidProviderSelect').addEventListener('change', renderVideoModels);

        // 4. 启动数据加载系统
        bootstrapApp();
    });

    function showToast(msg) {
        const toast = document.getElementById("toast");
        toast.innerText = msg;
        toast.className = "show";
        setTimeout(() => toast.className = toast.className.replace("show", ""), 3000);
    }

    // ==========================================
    // 核心网络请求与系统引导
    // ==========================================
    async function bootstrapApp() {
        try {
            const res = await fetch(JSON_URL);
            if (!res.ok) throw new Error("Fetch failed");
            const data = await res.json();
            if (!data || !data.models) throw new Error("Invalid JSON");
            rawData = data;
        } catch (e) {
            console.warn("读取远端数据失败，启用本地离线内置数据！");
            rawData = DEFAULT_FALLBACK_DATA;
        }

        // 初始化 API 调用面板
        const functions = [...new Set(rawData.models.map(m => m.function))];
        const funcSelect = document.getElementById('funcSelect');
        funcSelect.innerHTML = '';
        functions.forEach(f => funcSelect.add(new Option(f, f)));
        filterProviders();

        // 初始化 视频预算面板
        initBudgetPanel();
    }

    // ==========================================
    // 第一面板：API 调用价格核算逻辑
    // ==========================================
    function filterProviders() {
        const func = document.getElementById('funcSelect').value;
        const providers = [...new Set(rawData.models.filter(m => m.function === func).map(m => m.provider))];
        const pSelect = document.getElementById('providerSelect');
        pSelect.innerHTML = '';
        providers.forEach(p => pSelect.add(new Option(p, p)));
        filterVersions();
    }

    function filterVersions() {
        const func = document.getElementById('funcSelect').value;
        const prov = document.getElementById('providerSelect').value;
        const versions = rawData.models.filter(m => m.function === func && m.provider === prov);
        const vSelect = document.getElementById('versionSelect');
        vSelect.innerHTML = '';
        versions.forEach(v => vSelect.add(new Option(v.name, v.official_id)));
        updateUnitPrice();
    }

    function getSelectedModel(funcId, provId, verId) {
        const func = document.getElementById(funcId).value;
        const prov = document.getElementById(provId).value;
        const id = document.getElementById(verId).value;
        return rawData.models.find(m => m.function === func && m.provider === prov && m.official_id === id);
    }

    function updateUnitPrice() {
        const model = getSelectedModel('funcSelect', 'providerSelect', 'versionSelect');
        if(!model) return;
        
        let priceInRMB = model.price;
        if(model.currency === "USD") priceInRMB = model.price * (rawData.config.usd_to_rmb || 7.2);
        if(model.currency === "Points") priceInRMB = model.price * 0.1;
        
        document.getElementById('unitPriceDisplay').innerText = `¥ ${priceInRMB.toFixed(2)}`;
        document.getElementById('unitTypeNote').innerText = `计费单位：${model.unit} | 原始报价：${model.price}${model.currency}`;
        document.getElementById('inputLabel').innerText = `⏱️ 输入生成数量 / 时长 (${model.unit})`;
        
        calculateAll();
    }

    function calculateAll() {
        const model = getSelectedModel('funcSelect', 'providerSelect', 'versionSelect');
        if(!model) return;

        let basePrice = model.price;
        if(model.currency === "USD") basePrice *= (rawData.config.usd_to_rmb || 7.2);
        if(model.currency === "Points") basePrice *= 0.1;

        const qInput = document.getElementById('quantity');
        const q = Math.floor(parseFloat(qInput.value)) || 0; 
        
        let rawTotalCost = (model.unit === "5秒") ? (Math.ceil(q / 5) * basePrice) : (q * basePrice);

        // 核心财务规则：保留两位小数，计算结果均向上取整
        const totalCost = Math.ceil(rawTotalCost * 100) / 100;
        document.getElementById('totalCostDisplay').innerText = `¥ ${totalCost.toFixed(2)}`;

        const roi = parseFloat(document.getElementById('roiInput').value) || 1;
        const finalSuggested = Math.ceil((basePrice * roi) * 100) / 100;
        
        document.getElementById('suggestedPrice').innerText = `¥ ${finalSuggested.toFixed(2)} / ${model.unit}`;
    }

    // ==========================================
    // 第二面板：AI 视频预算分析逻辑
    // ==========================================
    function validateShotDuration() {
        const input = document.getElementById('shotDuration');
        if (parseInt(input.value) > 15) {
            showToast("大模型不支持");
            input.value = 15;
        }
        calculateBudgetAnalyis();
    }

    function initBudgetPanel() {
        const provs = [...new Set(BUDGET_MODELS.map(m => m.prov))];
        const imgProvSel = document.getElementById('imgProviderSelect');
        const vidProvSel = document.getElementById('vidProviderSelect');
        imgProvSel.innerHTML = ''; vidProvSel.innerHTML = '';
        
        provs.forEach(p => {
            imgProvSel.add(new Option(p, p));
            vidProvSel.add(new Option(p, p));
        });

        renderImageModels();
        renderVideoModels();
    }

    function renderImageModels() {
        const prov = document.getElementById('imgProviderSelect').value;
        const models = BUDGET_MODELS.filter(m => m.func === '生图' && m.prov === prov);
        const sel = document.getElementById('imgModelSelect');
        sel.innerHTML = '';
        models.forEach((m, i) => sel.add(new Option(`${m.name} (${m.res})`, i)));
        
        const defaultIndex = models.findIndex(m => m.name.includes("图片3.0") && m.res.includes("1k"));
        if (defaultIndex !== -1) sel.selectedIndex = defaultIndex;
        
        calculateBudgetAnalyis();
    }

    function renderVideoModels() {
        const prov = document.getElementById('vidProviderSelect').value;
        const models = BUDGET_MODELS.filter(m => m.func === '生视频' && m.prov === prov);
        const sel = document.getElementById('vidModelSelect');
        sel.innerHTML = '';
        models.forEach((m, i) => sel.add(new Option(`${m.name} (${m.res})`, i)));
        
        const defaultIndex = models.findIndex(m => m.name.includes("视频3.0") && m.res.includes("1080p"));
        if (defaultIndex !== -1) sel.selectedIndex = defaultIndex;

        calculateBudgetAnalyis();
    }

    function calculateBudgetAnalyis() {
        const epDuration = parseInt(document.getElementById('epDuration').value) || 0;
        const epCount = parseInt(document.getElementById('epCount').value) || 0;
        const shotDuration = parseInt(document.getElementById('shotDuration').value) || 10;
        const imgDraws = parseInt(document.getElementById('imgDraws').value) || 0;
        const vidDraws = parseInt(document.getElementById('vidDraws').value) || 0;

        const shotCount = Math.ceil(epDuration / shotDuration);
        document.getElementById('shotCountDisplay').innerText = shotCount;
        document.getElementById('firstFrameCountDisplay').innerText = shotCount;

        const totalEpisodes = epCount;
        
        // 渲染生图预算表
        const imgModels = BUDGET_MODELS.filter(m => m.func === '生图' && m.prov === document.getElementById('imgProviderSelect').value);
        const activeImgModel = imgModels[document.getElementById('imgModelSelect').value];
        if (activeImgModel) {
            document.getElementById('imgUnitPriceDisplay').innerText = `${activeImgModel.price} ${activeImgModel.unit} / 张`;
            renderMatrixTable('imageBudgetTable', activeImgModel, shotCount * totalEpisodes * imgDraws, '首帧图数量');
        }

        // 渲染生视频预算表
        const vidModels = BUDGET_MODELS.filter(m => m.func === '生视频' && m.prov === document.getElementById('vidProviderSelect').value);
        const activeVidModel = vidModels[document.getElementById('vidModelSelect').value];
        if (activeVidModel) {
            document.getElementById('vidUnitPriceDisplay').innerText = `${activeVidModel.price} ${activeVidModel.unit} / 段`;
            renderMatrixTable('videoBudgetTable', activeVidModel, shotCount * totalEpisodes * vidDraws, '视频生成总段数');
        }
    }

    function renderMatrixTable(tableId, model, totalGenerations, targetName) {
        const table = document.getElementById(tableId);
        let html = `<tr><th>会员等级</th><th>购买方式</th><th>费用计算 (公式)</th><th>折合费用 (元)</th></tr>`;

        if (model.prov !== "可灵") {
            html += `<tr><td colspan="4" style="text-align:center; padding: 20px;">当前仅支持“可灵”灵感值汇率体系的细致拆解。</td></tr>`;
            table.innerHTML = html;
            return;
        }

        KLING_RATES.forEach(rateItem => {
            const rawCost = model.price * totalGenerations * rateItem.rate;
            // 核心财务规则：保留两位小数，计算结果均向上取整
            const finalRmbCost = Math.ceil(rawCost * 100) / 100;
            const formulaStr = `${model.price} (${model.unit}) × ${totalGenerations} (${targetName}) × ${rateItem.rate}`;
            
            html += `
                <tr>
                    <td>${rateItem.tier}</td>
                    <td>${rateItem.method}</td>
                    <td style="color: var(--text-sub); font-family: monospace;">${formulaStr}</td>
                    <td class="price-highlight">¥ ${finalRmbCost.toFixed(2)}</td>
                </tr>`;
        });
        table.innerHTML = html;
    }
</script>
</body>
</html>
