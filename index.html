<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 运营成本与定价看板 🎬</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc;
            --panel-bg: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --border: #e2e8f0;
            --radius: 16px;
            --max-width: 700px;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 40px 20px;
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 24px 24px;
        }

        .header-image {
            width: 100%;
            max-width: var(--max-width);
            height: auto;
            margin-bottom: 24px;
            border-radius: var(--radius);
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
        }

        .container {
            width: 100%;
            max-width: var(--max-width);
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .card {
            background: var(--panel-bg);
            padding: 30px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #475569;
            border-left: 4px solid #6366f1;
            padding-left: 12px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
        }

        .group { margin-bottom: 16px; }
        
        label { 
            display: block; 
            font-size: 0.75rem; 
            margin-bottom: 6px; 
            color: var(--text-sub);
            font-weight: 600;
            text-transform: uppercase;
        }

        select, input { 
            width: 100%; 
            padding: 12px 14px; 
            border: 1px solid var(--border); 
            border-radius: 10px; 
            font-size: 0.95rem; 
            background: #fcfcfd;
            outline: none;
            box-sizing: border-box;
            transition: 0.2s;
        }

        select:focus, input:focus { 
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .result-box {
            background: #f8fafc;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px dashed var(--border);
        }

        .highlight-text {
            font-size: 2rem;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hint {
            font-size: 0.8rem;
            color: var(--text-sub);
            margin-bottom: 15px;
            line-height: 1.5;
        }

        @media (max-width: 600px) {
            .grid-3 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <img src="https://github.com/foreverai2026/ai-price-calculator/blob/main/%E9%A1%B6%E9%83%A8%E5%9B%BE_%E5%89%AF%E6%9C%AC.jpg?raw=true" class="header-image">

    <div class="container">
        <div class="card">
            <div class="section-title">01 模型选择与单价查询 🔍</div>
            <div class="grid-3">
                <div class="group">
                    <label>生成能力</label>
                    <select id="funcSelect" onchange="filterProviders()"></select>
                </div>
                <div class="group">
                    <label>模型厂商</label>
                    <select id="providerSelect" onchange="filterVersions()"></select>
                </div>
                <div class="group">
                    <label>模型版本</label>
                    <select id="versionSelect" onchange="updateUnitPrice()"></select>
                </div>
            </div>
            <div class="result-box">
                <label>折合成本单价 (RMB)</label>
                <div id="unitPriceDisplay" class="highlight-text">¥ 0.00</div>
                <div id="unitTypeNote" class="note" style="font-size: 0.85rem; color: #64748b;">--</div>
            </div>
        </div>

        <div class="card">
            <div class="section-title">02 生成成本计算器 🧮</div>
            <div class="group">
                <label id="inputLabel">输入数量 (张/秒)</label>
                <input type="number" id="quantity" value="1" oninput="calculateAll()">
            </div>
            <div class="result-box" style="background: #f1f5f9;">
                <label>总成本 (向上取整)</label>
                <div id="totalCostDisplay" class="highlight-text" style="font-size: 2.5rem;">¥ 0.00</div>
            </div>
        </div>

        <div class="card" style="border: 1px solid #c7d2fe;">
            <div class="section-title">03 商业定价辅助方案 💡</div>
            <p class="hint">ROI 模式：建议定价 = 单价 × ROI。结果执行向上取整，防止长尾亏损。</p>
            <div class="grid-3" style="grid-template-columns: 1fr 2fr;">
                <div class="group">
                    <label>设定 ROI (倍数)</label>
                    <input type="number" id="roiInput" value="1.5" step="0.1" oninput="calculateAll()">
                </div>
                <div class="group">
                    <label>建议功能定价 (向用户收取)</label>
                    <div id="suggestedPrice" class="highlight-text" style="padding-top: 5px;">¥ 0.00</div>
                </div>
            </div>
        </div>
    </div>

<script>
    let rawData = {};
    const JSON_URL = 'https://raw.githubusercontent.com/foreverai2026/ai-price-calculator/main/prices.json';

    async function loadData() {
        try {
            const res = await fetch(JSON_URL);
            rawData = await res.json();
            const functions = [...new Set(rawData.models.map(m => m.function))];
            const funcSelect = document.getElementById('funcSelect');
            functions.forEach(f => funcSelect.add(new Option(f, f)));
            filterProviders();
        } catch (e) {
            console.error("数据加载失败");
        }
    }

    function filterProviders() {
        const func = document.getElementById('funcSelect').value;
        const providers = [...new Set(rawData.models.filter(m => m.function === func).map(m => m.provider))];
        const pSelect = document.getElementById('providerSelect');
        pSelect.innerHTML = '';
        providers.forEach(p => pSelect.add(new Option(p, p)));
        filterVersions();
    }

    function filterVersions() {
        const func = document.getElementById('funcSelect').value;
        const prov = document.getElementById('providerSelect').value;
        const versions = rawData.models.filter(m => m.function === func && m.provider === prov);
        const vSelect = document.getElementById('versionSelect');
        vSelect.innerHTML = '';
        versions.forEach(v => vSelect.add(new Option(v.name, v.official_id)));
        updateUnitPrice();
    }

    function updateUnitPrice() {
        const model = getSelectedModel();
        if(!model) return;
        
        let priceInRMB = model.price;
        if(model.currency === "USD") priceInRMB = model.price * (rawData.config.usd_to_rmb || 7.2);
        if(model.currency === "Points") priceInRMB = model.price * 0.1;

        // 涉及到钱的字段，保留两位小数
        document.getElementById('unitPriceDisplay').innerText = `¥ ${priceInRMB.toFixed(2)}`;
        document.getElementById('unitTypeNote').innerText = `单位：${model.unit} | 原始：${model.price}${model.currency}`;
        document.getElementById('inputLabel').innerText = `输入生成数量 / 时长 (${model.unit})`;
        
        calculateAll();
    }

    function getSelectedModel() {
        const id = document.getElementById('versionSelect').value;
        return rawData.models.find(m => m.official_id === id);
    }

    function calculateAll() {
        const model = getSelectedModel();
        if(!model) return;

        let basePrice = model.price;
        if(model.currency === "USD") basePrice *= (rawData.config.usd_to_rmb || 7.2);
        if(model.currency === "Points") basePrice *= 0.1;

        // 1. 计算总成本
        const q = parseFloat(document.getElementById('quantity').value) || 0;
        let rawTotal = 0;
        if (model.unit === "5秒") {
            rawTotal = Math.ceil(q / 5) * basePrice;
        } else {
            rawTotal = q * basePrice;
        }
        
        // 计算结果均向上取整 (Ceil)，并保留两位小数
        const finalTotal = Math.ceil(rawTotal); 
        document.getElementById('totalCostDisplay').innerText = `¥ ${finalTotal.toFixed(2)}`;

        // 2. 辅助定价计算
        const roi = parseFloat(document.getElementById('roiInput').value) || 1;
        const rawSuggested = basePrice * roi;
        // 同样执行向上取整
        const finalSuggested = Math.ceil(rawSuggested);
        document.getElementById('suggestedPrice').innerText = `¥ ${finalSuggested.toFixed(2)} / ${model.unit}`;
    }

    loadData();
</script>
</body>
</html>
