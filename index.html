<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 运营成本与定价看板</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc;
            --panel-bg: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --budget-gradient: linear-gradient(135deg, #ef4444 0%, #f97316 100%);
            --border: #e2e8f0;
            --radius: 16px;
            --max-width: 700px;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 40px 20px;
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 24px 24px;
        }

        .header-image {
            width: 100%;
            max-width: var(--max-width);
            height: auto;
            margin-bottom: 24px;
            border-radius: var(--radius);
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
        }

        .container {
            width: 100%;
            max-width: var(--max-width);
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* --- Tab 样式 --- */
        .tabs-container {
            display: flex;
            gap: 16px;
            width: 100%;
        }

        .tab-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px;
            background: var(--panel-bg);
            border: 2px solid transparent;
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            color: var(--text-sub);
            font-weight: 600;
            font-size: 1.05rem;
        }

        .tab-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        .tab-btn.active {
            border-color: #6366f1;
            color: #1e293b;
            background: #f8fafc;
        }

        .tab-btn[data-target="tab-budget"].active {
            border-color: #ef4444;
        }

        .tab-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #e2e8f0;
            background-color: #f1f5f9;
        }

        .tab-btn.active .tab-avatar {
            border-color: #6366f1;
        }

        .tab-btn[data-target="tab-budget"].active .tab-avatar {
            border-color: #ef4444;
        }

        .tab-content {
            display: none;
            width: 100%;
            flex-direction: column;
            gap: 24px;
            animation: fadeIn 0.4s ease forwards;
        }

        .tab-content.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* --- 结束 --- */

        .card {
            background: var(--panel-bg);
            padding: 30px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
        }

        .section-title {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #1e293b;
        }

        .title-line {
            width: 40px;
            height: 4px;
            background: var(--primary-gradient);
            border-radius: 2px;
            margin-bottom: 20px;
        }

        .section-desc {
            font-size: 0.85rem;
            color: var(--text-sub);
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
        }

        .group { margin-bottom: 16px; }
        
        label { 
            display: block; 
            font-size: 0.75rem; 
            margin-bottom: 6px; 
            color: var(--text-sub);
            font-weight: 600;
            text-transform: uppercase;
        }

        select, input { 
            width: 100%; 
            padding: 12px 14px; 
            border: 1px solid var(--border); 
            border-radius: 10px; 
            font-size: 0.95rem; 
            background: #fcfcfd;
            outline: none;
            box-sizing: border-box;
            transition: 0.2s;
        }

        select:focus, input:focus { 
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .result-box {
            background: #f8fafc;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px dashed var(--border);
        }

        .highlight-text {
            font-size: 2.2rem;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @media (max-width: 600px) {
            .grid-3 { grid-template-columns: 1fr; }
            .tabs-container { flex-direction: column; }
        }
    </style>
</head>
<body>

    <img src="https://github.com/foreverai2026/ai-price-calculator/blob/main/%E9%A1%B6%E9%83%A8%E5%9B%BE_%E5%89%AF%E6%9C%AC.jpg?raw=true" class="header-image">

    <div class="container">
        
        <div class="tabs-container">
            <button class="tab-btn active" data-target="tab-api" onclick="switchTab('tab-api')">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Operation&style=circle&backgroundColor=e2e8f0" alt="运营职员" class="tab-avatar">
                <span>API 调用价格</span>
            </button>
            <button class="tab-btn" data-target="tab-budget" onclick="switchTab('tab-budget')">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Creator&style=circle&backgroundColor=fecdd3" alt="创作者" class="tab-avatar">
                <span>AI 视频预算分析</span>
            </button>
        </div>

        <div id="tab-api" class="tab-content active">
            <div class="card">
                <div class="section-title">🔍 01 模型库与单价查询</div>
                <div class="title-line"></div>
                <div class="section-desc">📑 同步市面热门 AI 模型计费规则，实时查询 API 原始采购成本。</div>
                <div class="grid-3">
                    <div class="group">
                        <label>生成能力</label>
                        <select id="funcSelect" onchange="filterProviders()"></select>
                    </div>
                    <div class="group">
                        <label>模型厂商</label>
                        <select id="providerSelect" onchange="filterVersions()"></select>
                    </div>
                    <div class="group">
                        <label>模型版本</label>
                        <select id="versionSelect" onchange="updateUnitPrice()"></select>
                    </div>
                </div>
                <div class="result-box">
                    <label>折合成本单价 (RMB)</label>
                    <div id="unitPriceDisplay" class="highlight-text">¥ 0.00</div>
                    <div id="unitTypeNote" class="note" style="font-size: 0.85rem; color: #64748b; margin-top:5px;">--</div>
                </div>
            </div>

            <div class="card">
                <div class="section-title">🧮 02 生产成本核算器</div>
                <div class="title-line"></div>
                <div class="section-desc">📏 根据预期的生成规模，快速估算本次生产任务的原始 API 支出总额。</div>
                <div class="group">
                    <label id="inputLabel">输入生成数量 (整数)</label>
                    <input type="number" id="quantity" value="1" step="1" oninput="this.value=this.value.replace(/\D/g,'');calculateAll()">
                </div>
                <div class="result-box" style="background: #f1f5f9; border-style: solid;">
                    <label>预估总成本</label>
                    <div id="totalCostDisplay" class="highlight-text" style="font-size: 2.6rem;">¥ 0.00</div>
                </div>
            </div>

            <div class="card" style="border: 1px solid #c7d2fe;">
                <div class="section-title">💡 03 商业零售定价助手</div>
                <div class="title-line"></div>
                <div class="section-desc">📢 如果你通过 API 调用后向用户收费，则可用此功能辅助计算零售定价。基于成本单价，通过调整 ROI（投资回报倍数）来核算面向终端用户的建议零售价格 [cite: 38, 39]。</div>
                
                <div class="grid-3" style="grid-template-columns: 1fr 2.5fr;">
                    <div class="group">
                        <label>设定预期 ROI</label>
                        <input type="number" id="roiInput" value="1.5" step="0.1" oninput="calculateAll()">
                    </div>
                    <div class="group">
                        <label>建议零售定价 (对用户价)</label>
                        <div id="suggestedPrice" class="highlight-text" style="padding-top: 5px;">¥ 0.00</div>
                    </div>
                </div>
            </div>
        </div>

       <div id="tab-budget" class="tab-content">
            <div class="card" style="border: 1px solid #fca5a5;">
                <div class="section-title">📊 视频数据设定</div>
                <div class="title-line" style="background: var(--budget-gradient);"></div>
                
                <div class="grid-3">
                    <div class="group">
                        <label>每集时长 (秒)</label>
                        <input type="number" id="epDuration" value="60" step="1" oninput="calculateBudgetAnalyis()">
                    </div>
                    <div class="group">
                        <label>集数 (集)</label>
                        <input type="number" id="epCount" value="1" step="1" oninput="calculateBudgetAnalyis()">
                    </div>
                    <div class="group">
                        <label>分镜视频时长 (秒/段)</label>
                        <input type="number" id="shotDuration" value="10" step="1" oninput="validateShotDuration()">
                    </div>
                </div>

                <div class="grid-3" style="background: #fff1f2; padding: 15px; border-radius: 10px; margin-bottom: 16px;">
                    <div class="group" style="margin-bottom: 0;">
                        <label>分镜数 (自动计算)</label>
                        <div id="shotCountDisplay" style="font-size: 1.2rem; font-weight: bold; color: #be123c;">6</div>
                    </div>
                    <div class="group" style="margin-bottom: 0;">
                        <label>首帧图数量</label>
                        <div id="firstFrameCountDisplay" style="font-size: 1.2rem; font-weight: bold; color: #be123c;">6</div>
                    </div>
                </div>

                <div class="grid-3">
                    <div class="group">
                        <label>首帧图抽卡数 (次/帧)</label>
                        <input type="number" id="imgDraws" value="10" step="1" oninput="calculateBudgetAnalyis()">
                    </div>
                    <div class="group">
                        <label>分镜视频抽卡数 (次/段)</label>
                        <input type="number" id="vidDraws" value="5" step="1" oninput="calculateBudgetAnalyis()">
                    </div>
                </div>
            </div>

            <div class="card" style="border: 1px solid #e2e8f0;">
                <div class="section-title">🖼️ 生图费用预估</div>
                <div class="title-line"></div>
                
                <div class="grid-3">
                    <div class="group">
                        <label>模型厂商</label>
                        <select id="imgProviderSelect" onchange="renderImageModels()"></select>
                    </div>
                    <div class="group">
                        <label>模型版本 & 分辨率</label>
                        <select id="imgModelSelect" onchange="calculateBudgetAnalyis()"></select>
                    </div>
                    <div class="group">
                        <label>单价</label>
                        <div id="imgUnitPriceDisplay" style="padding: 12px; background: #f8fafc; border-radius: 8px; font-weight: 600;">--</div>
                    </div>
                </div>
                
                <label style="margin-top: 10px; font-size: 0.85rem; color: #1e293b;">费用详情对比 (按不同会员等级)</label>
                <div style="overflow-x: auto;">
                    <table class="budget-table" id="imageBudgetTable">
                        </table>
                </div>
            </div>

            <div class="card" style="border: 1px solid #e2e8f0;">
                <div class="section-title">🎥 生视频费用预估</div>
                <div class="title-line"></div>
                
                <div class="grid-3">
                    <div class="group">
                        <label>模型厂商</label>
                        <select id="vidProviderSelect" onchange="renderVideoModels()"></select>
                    </div>
                    <div class="group">
                        <label>模型版本 & 分辨率</label>
                        <select id="vidModelSelect" onchange="calculateBudgetAnalyis()"></select>
                    </div>
                    <div class="group">
                        <label>单价</label>
                        <div id="vidUnitPriceDisplay" style="padding: 12px; background: #f8fafc; border-radius: 8px; font-weight: 600;">--</div>
                    </div>
                </div>

                <label style="margin-top: 10px; font-size: 0.85rem; color: #1e293b;">费用详情对比 (按不同会员等级)</label>
                <div style="overflow-x: auto;">
                    <table class="budget-table" id="videoBudgetTable">
                        </table>
                </div>
            </div>
        </div>

        <style>
            .budget-table {
                width: 100%;
                border-collapse: collapse;
                margin-top: 8px;
                font-size: 0.85rem;
                text-align: left;
            }
            .budget-table th, .budget-table td {
                padding: 10px;
                border: 1px solid var(--border);
            }
            .budget-table th {
                background-color: #f1f5f9;
                color: var(--text-sub);
                font-weight: 600;
            }
            .budget-table tr:hover {
                background-color: #f8fafc;
            }
            .price-highlight {
                color: #e11d48;
                font-weight: bold;
            }
            #toast {
                visibility: hidden;
                min-width: 250px;
                background-color: #333;
                color: #fff;
                text-align: center;
                border-radius: 8px;
                padding: 16px;
                position: fixed;
                z-index: 1000;
                left: 50%;
                top: 30px;
                transform: translateX(-50%);
                box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
            }
            #toast.show {
                visibility: visible;
                animation: fadein 0.5s, fadeout 0.5s 2.5s;
            }
            @keyframes fadein { from {top: 0; opacity: 0;} to {top: 30px; opacity: 1;} }
            @keyframes fadeout { from {top: 30px; opacity: 1;} to {top: 0; opacity: 0;} }
        </style>
        <div id="toast">大模型不支持</div>

    </div>

<script>
// --- 可灵会员费率配置表 ---
    const KLING_RATES = [
        { tier: "仅充值", method: "仅充值", rate: 0.1 },
        { tier: "黄金会员", method: "单次购买-1个月", rate: 0.10 },
        { tier: "铂金会员", method: "单次购买-1个月", rate: 0.0887 },
        { tier: "钻石会员", method: "单次购买-1个月", rate: 0.0833 },
        { tier: "黑金会员", method: "单次购买-1个月", rate: 0.0505 },
        { tier: "黄金会员", method: "单次购买-3个月", rate: 0.0899 },
        { tier: "铂金会员", method: "单次购买-3个月", rate: 0.0798 },
        { tier: "钻石会员", method: "单次购买-3个月", rate: 0.0749 },
        { tier: "黑金会员", method: "单次购买-3个月", rate: 0.0455 },
        { tier: "黄金会员", method: "单次购买-12个月", rate: 0.0699 },
        { tier: "铂金会员", method: "单次购买-12个月", rate: 0.0621 },
        { tier: "钻石会员", method: "单次购买-12个月", rate: 0.0583 },
        { tier: "黑金会员", method: "单次购买-12个月", rate: 0.0355 },
        { tier: "黄金会员", method: "连续包月", rate: 0.0879 },
        { tier: "铂金会员", method: "连续包月", rate: 0.0780 },
        { tier: "钻石会员", method: "连续包月", rate: 0.0733 },
        { tier: "黑金会员", method: "连续包月", rate: 0.0442 },
        { tier: "黄金会员", method: "连续包季", rate: 0.0768 },
        { tier: "铂金会员", method: "连续包季", rate: 0.0682 },
        { tier: "钻石会员", method: "连续包季", rate: 0.0641 },
        { tier: "黑金会员", method: "连续包季", rate: 0.0391 }
    ];

    // 本地硬编码模型数据 (支持未来扩展 Vidu/即梦)
    const BUDGET_MODELS = [
        { func: "生图", prov: "可灵", name: "图片3.0", res: "1k", price: 1, unit: "灵感值" },
        { func: "生图", prov: "可灵", name: "图片3.0", res: "2k", price: 1, unit: "灵感值" },
        { func: "生图", prov: "可灵", name: "图片2.1", res: "无", price: 2, unit: "灵感值" },
        { func: "生视频", prov: "可灵", name: "视频3.0", res: "1080p", price: 12, unit: "灵感值" },
        { func: "生视频", prov: "可灵", name: "视频3.0", res: "720p", price: 9, unit: "灵感值" },
        { func: "生视频", prov: "可灵", name: "视频2.6", res: "1080P", price: 10, unit: "灵感值" },
        { func: "生视频", prov: "可灵", name: "视频2.5Turbo", res: "1080P", price: 5, unit: "灵感值" },
        { func: "生视频", prov: "可灵", name: "视频2.5Turbo", res: "720P", price: 3, unit: "灵感值" },
        { func: "生视频", prov: "可灵", name: "视频2.1", res: "1080P", price: 7, unit: "灵感值" },
        { func: "生视频", prov: "可灵", name: "视频2.1", res: "720P", price: 4, unit: "灵感值" },
        { func: "生视频", prov: "可灵", name: "视频2.1大师版", res: "无", price: 20, unit: "灵感值" },
        { func: "生视频", prov: "可灵", name: "视频1.6", res: "1080p", price: 7, unit: "灵感值" },
        { func: "生视频", prov: "可灵", name: "视频1.6", res: "720p", price: 4, unit: "灵感值" },
        { func: "生视频", prov: "可灵", name: "视频1.5", res: "1080p", price: 7, unit: "灵感值" },
        { func: "生视频", prov: "可灵", name: "视频1.5", res: "720p", price: 4, unit: "灵感值" },
        { func: "生视频", prov: "可灵", name: "数字人", res: "1080p", price: 8, unit: "灵感值" },
        { func: "生视频", prov: "可灵", name: "数字人", res: "720p", price: 4, unit: "灵感值" }
    ];

    function showToast(msg) {
        const toast = document.getElementById("toast");
        toast.innerText = msg;
        toast.className = "show";
        setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 3000);
    }

    function validateShotDuration() {
        const input = document.getElementById('shotDuration');
        if (parseInt(input.value) > 15) {
            showToast("大模型不支持");
            input.value = 15;
        }
        calculateBudgetAnalyis();
    }

    // 初始化时加载选项框 (可以在原有 loadData 的末尾调用 initBudgetPanel)
    function initBudgetPanel() {
        const provs = [...new Set(BUDGET_MODELS.map(m => m.prov))];
        
        const imgProvSel = document.getElementById('imgProviderSelect');
        const vidProvSel = document.getElementById('vidProviderSelect');
        imgProvSel.innerHTML = ''; vidProvSel.innerHTML = '';
        
        provs.forEach(p => {
            imgProvSel.add(new Option(p, p));
            vidProvSel.add(new Option(p, p));
        });

        renderImageModels();
        renderVideoModels();
    }

    function renderImageModels() {
        const prov = document.getElementById('imgProviderSelect').value;
        const models = BUDGET_MODELS.filter(m => m.func === '生图' && m.prov === prov);
        const sel = document.getElementById('imgModelSelect');
        sel.innerHTML = '';
        models.forEach((m, i) => sel.add(new Option(`${m.name} (${m.res})`, i)));
        
        // 默认选中 图片3.0 1k (如果存在)
        const defaultIndex = models.findIndex(m => m.name.includes("图片3.0") && m.res.includes("1k"));
        if (defaultIndex !== -1) sel.selectedIndex = defaultIndex;
        
        calculateBudgetAnalyis();
    }

    function renderVideoModels() {
        const prov = document.getElementById('vidProviderSelect').value;
        const models = BUDGET_MODELS.filter(m => m.func === '生视频' && m.prov === prov);
        const sel = document.getElementById('vidModelSelect');
        sel.innerHTML = '';
        models.forEach((m, i) => sel.add(new Option(`${m.name} (${m.res})`, i)));
        
        // 默认选中 视频3.0 1080p (如果存在)
        const defaultIndex = models.findIndex(m => m.name.includes("视频3.0") && m.res.includes("1080p"));
        if (defaultIndex !== -1) sel.selectedIndex = defaultIndex;

        calculateBudgetAnalyis();
    }

    // 核心核算逻辑
    function calculateBudgetAnalyis() {
        const epDuration = parseInt(document.getElementById('epDuration').value) || 0;
        const epCount = parseInt(document.getElementById('epCount').value) || 0;
        const shotDuration = parseInt(document.getElementById('shotDuration').value) || 10;
        const imgDraws = parseInt(document.getElementById('imgDraws').value) || 0;
        const vidDraws = parseInt(document.getElementById('vidDraws').value) || 0;

        // 计算分镜数和首帧数 (向上取整保证片段完整性)
        const shotCount = Math.ceil(epDuration / shotDuration);
        document.getElementById('shotCountDisplay').innerText = shotCount;
        document.getElementById('firstFrameCountDisplay').innerText = shotCount;

        const totalEpisodes = epCount;
        
        // --- 提取生图模型信息 ---
        const imgProv = document.getElementById('imgProviderSelect').value;
        const imgModels = BUDGET_MODELS.filter(m => m.func === '生图' && m.prov === imgProv);
        const imgSelIdx = document.getElementById('imgModelSelect').value;
        const activeImgModel = imgModels[imgSelIdx];
        
        if (activeImgModel) {
            document.getElementById('imgUnitPriceDisplay').innerText = `${activeImgModel.price} ${activeImgModel.unit} / 张`;
            const totalImages = shotCount * totalEpisodes * imgDraws;
            renderMatrixTable('imageBudgetTable', activeImgModel, totalImages, '首帧图数量');
        }

        // --- 提取生视频模型信息 ---
        const vidProv = document.getElementById('vidProviderSelect').value;
        const vidModels = BUDGET_MODELS.filter(m => m.func === '生视频' && m.prov === vidProv);
        const vidSelIdx = document.getElementById('vidModelSelect').value;
        const activeVidModel = vidModels[vidSelIdx];

        if (activeVidModel) {
            document.getElementById('vidUnitPriceDisplay').innerText = `${activeVidModel.price} ${activeVidModel.unit} / 段`;
            const totalVideos = shotCount * totalEpisodes * vidDraws;
            renderMatrixTable('videoBudgetTable', activeVidModel, totalVideos, '视频生成总段数');
        }
    }

    // 渲染带有计算公式的动态矩阵表格
    function renderMatrixTable(tableId, model, totalGenerations, targetName) {
        const table = document.getElementById(tableId);
        
        let html = `
            <tr>
                <th>会员等级</th>
                <th>购买方式</th>
                <th>费用计算 (公式)</th>
                <th>折合费用 (元)</th>
            </tr>
        `;

        if (model.prov !== "可灵") {
            html += `<tr><td colspan="4" style="text-align:center; padding: 20px;">当前仅支持“可灵”灵感值汇率体系的细致拆解。其他厂商待补充。</td></tr>`;
            table.innerHTML = html;
            return;
        }

        KLING_RATES.forEach(rateItem => {
            const rawCost = model.price * totalGenerations * rateItem.rate;
            // 严格执行：保留2位小数，计算结果向上取整
            const finalRmbCost = Math.ceil(rawCost * 100) / 100;
            
            const formulaStr = `${model.price} (${model.unit}) × ${totalGenerations} (${targetName}) × ${rateItem.rate}`;
            
            html += `
                <tr>
                    <td>${rateItem.tier}</td>
                    <td>${rateItem.method}</td>
                    <td style="color: var(--text-sub); font-family: monospace;">${formulaStr}</td>
                    <td class="price-highlight">¥ ${finalRmbCost.toFixed(2)}</td>
                </tr>
            `;
        });

        table.innerHTML = html;
    }

    // 在页面加载完成后调用初始化
    // 如果你之前的逻辑保留了，请确保页面加载后执行 initBudgetPanel()
    setTimeout(initBudgetPanel, 500);
</script>
</body>
</html>
